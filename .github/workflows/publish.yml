name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push tag, create GitHub Release
      id-token: write       # npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      # Quality gate — same as CI.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Read version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify head commit is a release commit
        run: |
          subject=$(git log -1 --pretty=%s)
          expected="chore(release): version packages"
          if [ "$subject" != "$expected" ]; then
            echo "Refusing to publish: HEAD subject is '$subject', expected '$expected'." >&2
            echo "Run Create Release first and merge the resulting PR before publishing." >&2
            exit 1
          fi

      - name: Verify tag does not already exist
        run: |
          tag="v${{ steps.pkg.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null \
             || git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally or on origin. Aborting." >&2
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tag and push
        run: |
          tag="v${{ steps.pkg.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"

      - name: Publish to npm (OIDC + provenance)
        run: npx changeset publish
        # No NODE_AUTH_TOKEN — OIDC trusted publishing handles auth.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
