name: Publish

on:
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push tag, create GitHub Release
      id-token: write       # npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Node 24 ships npm 11.x which handles OIDC trusted publishing correctly;
      # Node 22's bundled npm 10.9.x silently falls back to token auth and 404s.
      # registry-url is intentionally omitted: when set, setup-node writes an
      # .npmrc that npm prioritizes over OIDC, skipping the trusted-publisher
      # handshake (npm/cli#8730).
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      # Quality gate — same as CI.
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Read version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify no pending changesets
        run: |
          pending=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          if [ "$pending" -gt 0 ]; then
            echo "Refusing to publish: $pending pending changeset(s) in .changeset/." >&2
            echo "Run Create Release and merge the resulting Version Packages PR before publishing." >&2
            exit 1
          fi

      - name: Verify tag does not already exist
        run: |
          tag="v${{ steps.pkg.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$tag" >/dev/null \
             || git ls-remote --exit-code --tags origin "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists locally or on origin. Aborting." >&2
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tag and push
        run: |
          tag="v${{ steps.pkg.outputs.version }}"
          git tag "$tag"
          git push origin "$tag"

      - name: Publish to npm (OIDC + provenance)
        run: npx changeset publish
        # No NODE_AUTH_TOKEN — OIDC trusted publishing handles auth.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          generate_release_notes: true
